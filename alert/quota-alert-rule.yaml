apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tenant-quota-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: tenant-quota
      rules:
        - alert: TenantStorageNearLimit
          expr: |
            (
              kube_resourcequota{resource="requests.storage", type="used", namespace=~"ns-.*"}
              / on(namespace, resourcequota)
              kube_resourcequota{resource="requests.storage", type="hard", namespace=~"ns-.*"}
            ) * 100 >= 80
          for: 3s
          labels:
            severity: warning
          annotations:
            summary: "Storage quota nearly full for {{ $labels.namespace }}"
            description: "Namespace {{ $labels.namespace }} has used {{ $value | printf \"%.0f\" }}% of storage quota."